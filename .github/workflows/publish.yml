name: Telegram to VK Publisher

on:
  schedule:
    # Каждые 20 минут (оптимально для лимитов)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Ручной запуск
  push:
    branches: [ main ]  # Запуск при обновлении кода

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Полная история для коммитов
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'  # Кэширование зависимостей
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create temp directory
      run: mkdir -p temp_media
    
    - name: Run publisher
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        VK_GROUP_TOKEN: ${{ secrets.VK_GROUP_TOKEN }}
        VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
      run: python publisher.py
    
    - name: Commit and push processed IDs
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add processed_posts.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update processed posts [skip ci]" && git push)
