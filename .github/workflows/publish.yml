name: Telegram to VK Publisher

on:
  schedule:
    # Каждые 20 минут
    - cron: '*/20 * * * *'
  workflow_dispatch:  # Ручной запуск
  push:
    branches: [ main, master ]
    paths:
      - 'publisher.py'
      - '.github/workflows/*.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create necessary directories
      run: |
        mkdir -p temp_media
        # Создаем файл processed_posts.json если его нет
        if [ ! -f processed_posts.json ]; then
          echo "{}" > processed_posts.json
        fi
    
    - name: Run publisher
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        VK_GROUP_TOKEN: ${{ secrets.VK_GROUP_TOKEN }}
        VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
      run: python publisher.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add processed_posts.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Update processed posts [skip ci]"
          git push
        fi
    
    - name: Cleanup
      if: always()
      run: |
        rm -rf temp_media || true
        echo "✅ Cleanup completed"
