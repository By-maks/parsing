name: Telegram to VK Publisher

on:
  schedule:
    # Каждые 20 минут (чтобы вписаться в лимиты GitHub Actions)
    - cron: '*/20 * * * *'
  workflow_dispatch:  # Ручной запуск

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Run publisher
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        VK_GROUP_TOKEN: ${{ secrets.VK_GROUP_TOKEN }}
        VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
      run: python publisher.py
    
    - name: Commit and push processed IDs
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add processed_posts.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Update processed posts"
        git push
